<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes - Ama Cucaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="cardapio.css">
    <link rel="stylesheet" href="lista_clientes.css">
</head>

<body>
    <!-- HEADER (igual ao do cardapio) -->
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo-titulo">
                <img src="img/logo.jpg.jpg" alt="Logo Ama Cucaria" class="logo">
                <div>
                    <h1 class="marca-nome">Ama Cucaria</h1>
                    <p class="marca-subtitulo">CONFEITARIA ARTESANAL</p>
                </div>
            </div>
        </div>
    </header>

    <!-- NAV ADM (mesma estrutura do cardapio) -->
    <nav class="nav-adm" id="navAdm">
        <ul id="menu-adm">
            <li><a href="#pedidos"><i class="fa-solid fa-clipboard-check"></i>Pedidos</a></li>
            <li><a href="#dashboard"><i class="bi bi-graph-up"></i>Dashboard</a></li>
            <li><a href="cardapio.html"><i class="fa-solid fa-utensils"></i>Cardápio</a></li>
            <li><a href="lista_clientes.html" class="active"><i class="fa-solid fa-users"></i>Clientes</a></li>
        </ul>
    </nav>

    <div class="cliente">
        <h1>Lista de Clientes</h1>
    </div>

    <form class="formulario-pesquisa" action="/search" method="get">
        <input type="text" placeholder="Pesquisar por nome ou email..." id="pesquisa-cliente">
        <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
    </form>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>VIP</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabela-clientes">
            </tbody>
        </table>
    </div>

    <div class="modal-confirmacao" id="modalConfirmacaoExclusaoCliente" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTituloExclusaoCliente">
            <h3 id="modalTituloExclusaoCliente">Confirmar exclusão</h3>
            <p class="modal-texto">Tem certeza que deseja excluir este cliente?</p>
            <p><strong>Nome:</strong> <span id="modalClienteNome"></span></p>
            <p><strong>Email:</strong> <span id="modalClienteEmail"></span></p>
            <p><strong>VIP:</strong> <span id="modalClienteVip"></span></p>
            <div class="modal-acoes">
                <button type="button" class="modal-botao modal-botao-cancelar" id="modalCancelarExclusaoCliente">Cancelar</button>
                <button type="button" class="modal-botao modal-botao-confirmar" id="modalConfirmarExclusaoCliente">Excluir</button>
            </div>
        </div>
    </div>

    <script>
        const clientes = [
            { id: 1, nome: "Maria Silva", email: "maria@email.com", vip: false },
            { id: 2, nome: "Wesley Ferino", email: "wesley@email.com", vip: true },
            { id: 3, nome: "Felipe", email: "felipe@email.com", vip: true },
            { id: 4, nome: "Fernando ", email: "fernando@email.com", vip: true },
            { id: 5, nome: "Carlos", email: "carlos@email.com", vip: true },
            { id: 6, nome: "Lucas", email: "lucas@email.com", vip: true },
            { id: 7, nome: "Guilherme", email: "guilherme@email.com", vip: true },
            { id: 8, nome: "Gustavo", email: "gustavo@email.com", vip: true },
            { id: 9, nome: "Rino", email: "rino@email.com", vip: true },
            { id: 10, nome: "Fabricio", email: "fabricio@email.com", vip: true }
        ];
getElementById("tabela-clientes");
    const modalConfirmacaoExclusaoCliente = document.getElementById("modalConfirmacaoExclusaoCliente");
    const modalClienteNome = document.getElementById("modalClienteNome");
    const modalClienteEmail = document.getElementById("modalClienteEmail");
    const modalClienteVip = document.getElementById("modalClienteVip");
    const modalCancelarExclusaoCliente = document.getElementById("modalCancelarExclusaoCliente");
    const modalConfirmarExclusaoCliente = document.getElementById("modalConfirmarExclusaoCliente");
        let clientesRenderizados = [...clientes];
    let clienteSelecionadoParaExclusao = null;

        function renderizarClientes() {
            tabela.innerHTML = "";

            clientesRenderizados.forEach((cliente) => {
                const linha = document.createElement("tr");

                linha.innerHTML = `
                    <td>${cliente.nome}</td>
                    <td>${cliente.email}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${cliente.vip ? "checked" : ""} data-id="${cliente.id}">
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td>
                        <button type="button" class="botao-excluir" data-delete-id="${cliente.id}" aria-label="Excluir cliente ${cliente.nome}">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                `;

                tabela.appendChild(linha);
            });
        }

        renderizarClientes();

        function abrirModalExclusaoCliente(cliente) {
            clienteSelecionadoParaExclusao = cliente;
            modalClienteNome.textContent = cliente.nome;
            modalClienteEmail.textContent = cliente.email;
            modalClienteVip.textContent = cliente.vip ? "Sim" : "Não";
            modalConfirmacaoExclusaoCliente.classList.add("ativo");
            modalConfirmacaoExclusaoCliente.setAttribute("aria-hidden", "false");
        }

        function fecharModalExclusaoCliente() {
            modalConfirmacaoExclusaoCliente.classList.remove("ativo");
            modalConfirmacaoExclusaoCliente.setAttribute("aria-hidden", "true");
            clienteSelecionadoParaExclusao = null;
        }

        document.addEventListener("change", function (e) {
            if (e.target.type === "checkbox" && e.target.dataset.id) {
                const id = e.target.dataset.id;
                const vip = e.target.checked;

                clientesRenderizados = clientesRenderizados.map((cliente) => (
                    cliente.id === Number(id) ? { ...cliente, vip } : cliente
                ));

                console.log(`Cliente ${id} agora é VIP: ${vip}`);
            }
        });

        document.addEventListener("click", function (e) {
            const botaoExcluir = e.target.closest(".botao-excluir");

            if (!botaoExcluir) {
                return;
            }

            const id = Number(botaoExcluir.dataset.deleteId);
            const cliente = clientesRenderizados.find((item) => item.id === id);

            if (cliente) {
                abrirModalExclusaoCliente(cliente);
            }
        });

        modalCancelarExclusaoCliente.addEventListener("click", fecharModalExclusaoCliente);

        modalConfirmarExclusaoCliente.addEventListener("click", function () {
            if (!clienteSelecionadoParaExclusao) {
                return;
            }

            clientesRenderizados = clientesRenderizados.filter((cliente) => cliente.id !== clienteSelecionadoParaExclusao.id);
            renderizarClientes();
            fecharModalExclusaoCliente();
        });

        modalConfirmacaoExclusaoCliente.addEventListener("click", function (e) {
            if (e.target === modalConfirmacaoExclusaoCliente) {
                fecharModalExclusaoCliente();
            }
        });
    </script>

</body>

</html>
