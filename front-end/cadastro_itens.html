<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="cadastro_itens.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucaria</title>
</head>

<body>
    <div class="titulo">
        <img src="img/logoNew.png" alt="Logo">
        <h1>Ama Cucaria</h1>
    </div>

    <div class="container">
        <h1><i class="fa-solid fa-plus"></i> Cadastrar Produto</h1>
        <h3>Preencha os dados do novo produto</h3>

        <a href="cardapio.html" class="botao-voltar">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar para o Cardápio
        </a>

        <div id="mensagem-sucesso" class="mensagem-sucesso" aria-live="polite">
            <h4>Produto cadastrado com sucesso!</h4>
            <p><strong>Nome:</strong> <span id="sucesso-nome"></span></p>
            <p><strong>Valor de venda:</strong> <span id="sucesso-preco"></span></p>
            <p><strong>Descrição:</strong> <span id="sucesso-descricao"></span></p>
        </div>


        <form action="#" method="POST" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="campo">
                    <label for="nome">
                        <i class="bi bi-box-seam-fill"></i>
                        Nome do Produto*
                    </label>
                    <input type="text" placeholder="Ex: Dois amores" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="preco">
                        <i class="bi bi-currency-dollar"></i>
                        Preço de Venda (R$)*
                    </label>
                    <input type="number" placeholder="0,00" id="preco" name="preco" step="0.01" required>
                </div>

                <div class="campo">
                    <label for="preco_producao">
                        <i class="bi bi-currency-dollar"></i>
                        Preço de Produção (R$)*
                    </label>
                    <input type="number" placeholder="0,00" id="preco_producao" name="preco_producao" step="0.01"
                        required>
                </div>

                <div class="campo full">
                    <label for="descricao">
                        <i class="bi bi-file-earmark-text-fill"></i>
                        Descrição
                    </label>
                    <textarea id="descricao" placeholder="Descreva o produto..." rows="4" required></textarea>
                </div>

                <div class="campo full">
                    <label class="upload-label">
                        <i class="bi bi-image"></i>
                        Selecionar imagem
                        <input type="file" id="imagem" accept="image/*" hidden>
                    </label>
                    <img id="preview" src="" alt="Prévia da imagem">
                </div>

            </div>
            <button type="submit" class="botao">
                <i class="fa-solid fa-plus"></i>
                Cadastrar Produto
            </button>
        </form>
    </div>
<script>
const API_URL = "http://localhost/Cucaria/back-end/produtos.php";

const form = document.querySelector('form');
const nomeInput = document.getElementById('nome');
const precoInput = document.getElementById('preco');
const precoProducaoInput = document.getElementById('preco_producao');
const descricaoInput = document.getElementById('descricao');

const mensagemSucesso = document.getElementById('mensagem-sucesso');
const sucessoNome = document.getElementById('sucesso-nome');
const sucessoPreco = document.getElementById('sucesso-preco');
const sucessoDescricao = document.getElementById('sucesso-descricao');

const imagemInput = document.getElementById('imagem');
const preview = document.getElementById('preview');

// ===== PREVIEW =====
imagemInput.addEventListener('change', function () {
    const arquivo = this.files && this.files[0];

    if (!arquivo) {
        preview.src = '';
        preview.classList.remove('visible');
        return;
    }

    const objectUrl = URL.createObjectURL(arquivo);
    preview.src = objectUrl;
    preview.classList.add('visible');
});

// ===== ENVIO =====
form.addEventListener('submit', async function (event) {
    event.preventDefault();

    const nome = nomeInput.value.trim();
    const descricao = descricaoInput.value.trim();
    const preco = Number(precoInput.value);
    const precoProducao = Number(precoProducaoInput.value);
    const imagemArquivo = imagemInput.files[0];

    try {
        const formData = new FormData();

        formData.append("nome", nome);
        formData.append("preco_venda", preco);
        formData.append("preco_producao", precoProducao);
        formData.append("descricao", descricao);

        if (imagemArquivo) {
            formData.append("imagem", imagemArquivo); 
        }

        const response = await fetch(API_URL, {
            method: "POST",
            body: formData 
        });

        const resultado = await response.json();
        console.log("Resposta API:", resultado);

        if (resultado.success) {
            sucessoNome.textContent = nome;
            sucessoPreco.textContent = preco.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });
            sucessoDescricao.textContent = descricao;

            mensagemSucesso.classList.add('visible');

            form.reset();
            preview.src = '';
            preview.classList.remove('visible');

        } else {
            alert("Erro ao cadastrar produto");
        }

    } catch (erro) {
        console.error("Erro:", erro);
        alert("Erro ao conectar com a API");
    }
});
</script>
</body>

</html>
