<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ama Cucaria - Nova Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="esqueceu_senha.css"> 
</head>
<body>

    <div class="titulo">
        <img src="img/logoNew.png" alt="Logo">
        <h1>Ama Cucaria</h1>
    </div>

    <p style="text-align: center; font-size: 16px; margin-bottom: 20px; color: #555; font-weight: 600;">
        Crie uma nova senha segura para a sua conta.
    </p>

    <div id="caixa-mensagem" class="mensagem-alerta"></div>

    <form action="../API/processa_redefinicao.php" method="POST" class="container-login">
        
        <input type="hidden" name="token" id="tokenValue">

        <div class="campo">
            <label>Nova Senha</label>
            <input type="password" name="nova_senha" placeholder="Digite sua nova senha" required>
        </div>

        <div class="campo">
            <label>Confirmar Senha</label>
            <input type="password" name="confirma_senha" placeholder="Repita a nova senha" required>
        </div>

        <button type="submit" class="btn btn-centralizado">Salvar nova senha</button>

    </form>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const erro = urlParams.get('erro');
        const sucesso = urlParams.get('sucesso'); 
        const token = urlParams.get('token');
        const caixaMensagem = document.getElementById('caixa-mensagem');

        if (token) {
            document.getElementById('tokenValue').value = token;
        }
        
        if (erro == 'senhas_diferentes') {
            caixaMensagem.classList.add('erro');
            caixaMensagem.innerText = 'As senhas digitadas não são iguais!';
        } else if (erro == 'token_invalido') {
            caixaMensagem.classList.add('erro');
            caixaMensagem.innerText = 'O link de recuperação é inválido ou já expirou.';
        } else if (erro == 'erro_atualizacao') {
            caixaMensagem.classList.add('erro');
            caixaMensagem.innerText = 'Erro no servidor ao salvar a senha. Tente novamente.';
        }

        if (window.history.replaceState) {
            const urlLimpa = new URL(window.location);
            urlLimpa.searchParams.delete('erro');
            urlLimpa.searchParams.delete('sucesso');
            window.history.replaceState(null, '', urlLimpa);
        }
    </script>


</body>
</html>
