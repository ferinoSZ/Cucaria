<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Ama Cucaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="pedidos.css">
    <link rel="stylesheet" href="nav_adm.css">
</head>
<body>
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo-titulo">
                <img src="img/logoNew.png" alt="Logo Ama Cucaria" class="logo">
                <div>
                    <h1 class="marca-nome">Ama Cucaria</h1>
                    <p class="marca-subtitulo">CONFEITARIA ARTESANAL</p>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-adm" id="navAdm">
        <ul id="menu-adm">
            <li><a href="pedidos.html" class="active"><i class="fa-solid fa-clipboard-check"></i>Pedidos</a></li>
            <li><a href="dashboard.html"><i class="bi bi-graph-up"></i>Dashboard</a></li>
            <li><a href="cardapio.html"><i class="fa-solid fa-utensils"></i>Cardápio</a></li>
            <li><a href="controle_clientes.html"><i class="fa-solid fa-users"></i>Clientes</a></li>
            <li><a href="#" id="navSair"><i class="bi bi-box-arrow-right"></i>Sair</a></li>
        </ul>
    </nav>

    <main class="pedidos-layout">
        <section class="container painel-pedidos">
            <div class="painel-cabecalho">
                <h2 id="tituloPedidos">Pedidos (0)</h2>
            </div>
            <div class="lista-pedidos" id="listaPedidos"></div>
        </section>

        <aside class="painel-resumo">
            <section class="total-data-e-sabor">
                <div class="titulo-data-e-sabor">
                    <h3><i class="bi bi-calendar-event"></i>Por data de entrega</h3>
                    <h4 id="totalDataESabor">0</h4>
                </div>
                <div class="lista-data-e-sabor" id="listaDataESabor"></div>
            </section>

            <section class="total-sabor">
                <div class="titulo-total-sabor">
                    <h3><i class="bi bi-box-seam"></i>Total por sabor</h3>
                    <h4 id="totalPorSabor">0</h4>
                </div>
                <div class="lista-total-sabor" id="listaTotalSabor"></div>
            </section>
        </aside>
    </main>

    <div class="modal-confirmacao" id="modalConfirmacao" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalConfirmacaoTitulo">
            <h3 id="modalConfirmacaoTitulo">Confirmar</h3>
            <p class="modal-texto" id="modalConfirmacaoTexto"></p>
            <div class="modal-acoes">
                <button type="button" class="modal-botao modal-botao-cancelar" id="modalConfirmacaoNao">Voltar</button>
                <button type="button" class="modal-botao modal-botao-confirmar" id="modalConfirmacaoSim">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="sessao_guard.js"></script>
    <script src="pedidos.js"></script>
</body>
</html>
