<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Ama Cucaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="meus_pedidos.css">
</head>
<body>
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo-titulo">
                <img src="img/logoNew.png" alt="Logo Ama Cucaria" class="logo">
                <div>
                    <h1 class="marca-nome">Ama Cucaria</h1>
                    <p class="marca-subtitulo">CONFEITARIA ARTESANAL</p>
                </div>
            </div>
            <div class="cabecalho-acoes">
                <button class="botao-cabecalho" id="botaoVoltarCardapio" title="Voltar ao cardápio"
                    onclick="window.location.href='cardapio.html'">
                    <i class="fa-solid fa-utensils"></i>
                </button>
                <button class="botao-cabecalho" id="botaoSair" title="Sair">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="meus-pedidos-layout">
        <div class="painel-cabecalho">
            <h2 id="tituloMeusPedidos">Meus Pedidos</h2>
        </div>
        <div class="lista-meus-pedidos" id="listaMeusPedidos"></div>
    </main>

    <script src="confirmar.js"></script>
    <script src="meus_pedidos.js"></script>
</body>
</html>
