<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ama Cucaria - Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cadastro.css">
    </style>
</head>

<body>

    <div class="titulo">
        <img src="img/logo.jpg.jpg" alt="Logo">
        <h1>Ama Cucaria</h1>
    </div>

    <div class="container">
        <h1>Cadastrar Usuário</h1>
        <h3>Preencha os dados para criar uma nova conta</h3>

        <div id="caixa-mensagem" class="mensagem-alerta"></div>

       <form action="../frontXback/processa_cadastro.php" method="POST">
            <div class="form-grid">

                <div class="input-group full-width">
                    <label>
                        <svg viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                        Nome Completo *
                    </label>
                    <input type="text" name="nome" placeholder="Ex: Maria da Silva" required>
                </div>

                <div class="input-group full-width">
                    <label>
                        <svg viewBox="0 0 24 24">
                            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                        </svg>
                        E-mail *
                    </label>
                    <input type="email" name="email" placeholder="maria@exemplo.com" required>
                </div>

                <div class="input-group">
                    <label>
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                        </svg>
                        Senha *
                    </label>
                    <input type="password" name="senha" placeholder="Digite sua senha" required>
                </div>

                <div class="input-group">
                    <label>
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                        </svg>
                        Confirmar Senha *
                    </label>
                    <input type="password" name="confirma_senha" placeholder="Confirme sua senha" required>
                </div>

            </div>

            <button type="submit">
                Cadastrar Usuário
            </button>

            <a href="login.html" class="voltar">Voltar para login</a>
           
        </form>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const erro = urlParams.get('erro');
        const caixaMensagem = document.getElementById('caixa-mensagem');

        if (erro) {
            caixaMensagem.classList.add('erro');
            if (erro == 'senhas_nao_conferem') {
                caixaMensagem.innerText = 'As senhas digitadas não são iguais!';
            } else if (erro == 'email_em_uso') {
                caixaMensagem.innerText = 'Este e-mail já está cadastrado!';
            } else {
                caixaMensagem.innerText = 'Ocorreu um erro no cadastro.';
            }
        }

        if (window.history.replaceState) {
            const urlLimpa = new URL(window.location);
            urlLimpa.searchParams.delete('erro');
            urlLimpa.searchParams.delete('sucesso');
            window.history.replaceState(null, '', urlLimpa);
        }

    </script>


</body>

</html>
