<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Ama Cucaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="pedidos.css">
</head>
<body>
        <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo-titulo">
                <img src="img/logo.jpg.jpg" alt="Logo Ama Cucaria" class="logo">
                <div>
                    <h1 class="marca-nome">Ama Cucaria</h1>
                    <p class="marca-subtitulo">CONFEITARIA ARTESANAL</p>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-adm" id="navAdm" style="display: none;">
        <ul id="menu-adm">
            <li><a href="pedidos.html" class="active"><i class="fa-solid fa-clipboard-check"></i>Pedidos</a></li>
            <li><a href="#dashboard"><i class="bi bi-graph-up"></i>Dashboard</a></li>
            <li><a href="cardapio.html"><i class="fa-solid fa-utensils"></i>Cardápio</a></li>
            <li><a href="lista_clientes.html"><i class="fa-solid fa-users"></i>Clientes</a></li>
        </ul>
    </nav>

    <main class="pedidos-layout">
        <section class="container painel-pedidos">
            <div class="painel-cabecalho">
                <h2 id="tituloPedidos">Pedidos (0)</h2>
            </div>
            <div class="lista-pedidos" id="listaPedidos"></div>
        </section>

        <aside class="painel-resumo">
            <section class="total-data-e-sabor">
                <div class="titulo-data-e-sabor">
                    <h3><i class="bi bi-calendar-event"></i>Por data e sabor</h3>
                    <h4 id="totalDataESabor">0</h4>
                </div>
                <div class="lista-data-e-sabor" id="listaDataESabor"></div>
            </section>

            <section class="total-sabor">
                <div class="titulo-total-sabor">
                    <h3><i class="bi bi-box-seam"></i>Total por sabor</h3>
                    <h4 id="totalPorSabor">0</h4>
                </div>
                <div class="lista-total-sabor" id="listaTotalSabor"></div>
            </section>
        </aside>
    </main>
</body>
<script>
    const modoAdmAtivo = true; // Ativar modo ADM para testes

    const pedidos = [
        {
            id: 1,
            sabor: 'Dois Amores',
            cliente: 'Maria Silva',
            quantidade: 2,
            endereco: 'Rua das Flores, 123 - Centro',
            dataRecebimento: '28/04/2026 às 18:00',
            data: '28/04/2026',
            status: 'Aguardando'
        },
        {
            id: 2,
            sabor: 'Prestígio',
            cliente: 'João Santos',
            quantidade: 1,
            endereco: 'Av. Brasil, 456 - Jardim América',
            dataRecebimento: '29/04/2026 às 15:30',
            data: '29/04/2026',
            status: 'Aguardando'
        },
        {
            id: 3,
            sabor: 'Chocolate Branco',
            cliente: 'Ana Oliveira',
            quantidade: 3,
            endereco: 'Rua do Comércio, 789 - Vila Nova',
            dataRecebimento: '30/04/2026 às 20:00',
            data: '30/04/2026',
            status: 'Aguardando'
        },
        {
            id: 4,
            sabor: 'Chocolatuda',
            cliente: 'Carlos Pereira',
            quantidade: 1,
            endereco: 'Rua Sete de Setembro, 101 - Centro',
            dataRecebimento: '01/05/2026 às 14:00',
            data: '01/05/2026',
            status: 'Aguardando'
        },
        {
            id: 5,
            sabor: 'Choconinho',
            cliente: 'Fernanda Lima',
            quantidade: 2,
            endereco: 'Av. Independência, 202 - Boa Vista',
            dataRecebimento: '02/05/2026 às 17:00',
            data: '02/05/2026',
            status: 'Aguardando'
        },
        {
            id: 6,
            sabor: 'Choconinho',
            cliente: 'Cláudio Lima',
            quantidade: 5,
            endereco: 'Av. Independência, 202 - Boa Vista',
            dataRecebimento: '20/05/2026 às 17:00',
            data: '20/05/2026',
            status: 'Aguardando'
        }
    ];

    const listaPedidos = document.getElementById('listaPedidos');
    const tituloPedidos = document.getElementById('tituloPedidos');
    const totalDataESabor = document.getElementById('totalDataESabor');
    const listaDataESabor = document.getElementById('listaDataESabor');
    const totalPorSabor = document.getElementById('totalPorSabor');
    const listaTotalSabor = document.getElementById('listaTotalSabor');

    function agruparPedidos(chave) {
        return pedidos.reduce((acumulado, pedido) => {
            const valor = pedido[chave];
            if (!acumulado[valor]) {
                acumulado[valor] = 0;
            }
            acumulado[valor] += pedido.quantidade;
            return acumulado;
        }, {});
    }

    function agruparPedidosPorDataESabor() {
        return pedidos.reduce((acumulado, pedido) => {
            const chave = `${pedido.data}|${pedido.sabor}`;
            if (!acumulado[chave]) {
                acumulado[chave] = {
                    data: pedido.data,
                    sabor: pedido.sabor,
                    quantidade: 0
                };
            }
            acumulado[chave].quantidade += pedido.quantidade;
            return acumulado;
        }, {});
    }

    function formatarNumero(numero) {
        return String(numero).padStart(2, '0');
    }

    function renderizarPedidos() {
        tituloPedidos.textContent = `Pedidos (${pedidos.length})`;
        listaPedidos.innerHTML = pedidos.map((pedido) => `
            <article class="pedido">
                <div class="pedido-header">
                    <div class="pedido-titulo">
                        <i class="bi bi-box-seam"></i>
                        <h3>${pedido.sabor}</h3>
                    </div>
                    <span class="status">${pedido.status}</span>
                </div>
                <div class="pedido-detalhes">
                    <p><i class="bi bi-person"></i> ${pedido.cliente}</p>
                    <p><i class="bi bi-hash"></i> Qtd: ${pedido.quantidade}</p>
                    <p><i class="bi bi-geo-alt"></i> ${pedido.endereco}</p>
                </div>
                <div class="pedido-observacao">
                    <i class="bi bi-calendar2-event"></i>
                    <p>Cliente quer receber: <strong>${pedido.dataRecebimento}</strong></p>
                </div>
                <div class="pedido-acao">
                    <button class="botao-aceitar" data-pedido-id="${pedido.id}"><i class="bi bi-check-lg"></i>Aprovar</button>
                    <button class="botao-recusar" data-pedido-id="${pedido.id}"><i class="bi bi-x-lg"></i>Recusar</button>
                </div>
            </article>
        `).join('');
    }

    function renderizarResumoDataESabor() {
        const agrupado = agruparPedidosPorDataESabor();
        const entradas = Object.values(agrupado).sort((a, b) => {
            const [diaA, mesA, anoA] = a.data.split('/').map(Number);
            const [diaB, mesB, anoB] = b.data.split('/').map(Number);
            const comparacaoData = new Date(anoA, mesA - 1, diaA) - new Date(anoB, mesB - 1, diaB);
            if (comparacaoData !== 0) {
                return comparacaoData;
            }
            return a.sabor.localeCompare(b.sabor, 'pt-BR');
        });

        const total = pedidos.reduce((soma, pedido) => soma + pedido.quantidade, 0);
        totalDataESabor.textContent = total;

        listaDataESabor.innerHTML = entradas.map((item) => {
            return `
                <div class="item-data-e-sabor">
                    <div class="item-info">
                        <p class="item-data"><i class="bi bi-calendar2-event"></i>${item.data}</p>
                        <p class="item-sabor">${item.sabor}</p>
                    </div>
                    <span class="item-total">${item.quantidade}</span>
                </div>
            `;
        }).join('');
    }

    function renderizarResumoTotalSabor() {
        const agrupado = agruparPedidos('sabor');
        const entradas = Object.entries(agrupado).sort((a, b) => b[1] - a[1]);

        const total = pedidos.reduce((soma, pedido) => soma + pedido.quantidade, 0);
        totalPorSabor.textContent = total;

        listaTotalSabor.innerHTML = entradas.map(([sabor, quantidade]) => `
            <div class="item-total-sabor">
                <p class="item-sabor"><i class="bi bi-box-seam"></i>${sabor}</p>
                <span class="item-total">${quantidade}</span>
            </div>
        `).join('');
    }

    renderizarPedidos();
    renderizarResumoDataESabor();
    renderizarResumoTotalSabor();

    if (modoAdmAtivo) {
        document.getElementById('navAdm').style.display = 'block';
    }
</script>
</html>
