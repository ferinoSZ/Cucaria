<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="cadastro_itens.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucaria</title>
</head>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const toggle = document.querySelector(".menu-toggle i");
        const menu = document.querySelector("#menu");
        const overlay = document.querySelector(".overlay");
        const inputImagem = document.getElementById("imagem");
        const preview = document.getElementById("preview");

        function toggleMenu() {
            menu.classList.toggle("active");
            overlay.classList.toggle("active");

            if (menu.classList.contains("active")) {
                toggle.classList.remove("fa-bars");
                toggle.classList.add("fa-xmark");
                toggle.parentElement.classList.add("active");
                document.body.classList.add("menu-open");
            } else {
                toggle.classList.remove("fa-xmark");
                toggle.classList.add("fa-bars");
                toggle.parentElement.classList.remove("active");
                document.body.classList.remove("menu-open");
            }
        }

        toggle.parentElement.addEventListener("click", toggleMenu);
        overlay.addEventListener("click", toggleMenu);

        if (inputImagem && preview) {
            inputImagem.addEventListener("change", (event) => {
                const file = event.target.files && event.target.files[0];

                if (!file) {
                    preview.removeAttribute("src");
                    preview.classList.remove("visible");
                    return;
                }

                const objectUrl = URL.createObjectURL(file);
                preview.src = objectUrl;
                preview.classList.add("visible");
                preview.onload = () => URL.revokeObjectURL(objectUrl);
            });
        }

    });
</script>

<body>
    <div class="titulo">
        <img src="img/logo.jpg.jpg" alt="Logo">
        <h1>Ama Cucaria</h1>
    </div>

    <div class="nav">
        <div class="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="overlay"></div>

        <nav>
            <ul id="menu">
                <li><a href="#pedidos"><i class="fa-solid fa-clipboard-check"></i>Pedidos</a></li>
                <li><a href="#produtos" class="active"><i class="bi bi-box-seam-fill"></i>Produtos</a></li>
                <li><a href="#dashboard"><i class="bi bi-graph-up"></i>Dashboard</a></li>
                <li><a href="#cardapio"><i class="fa-solid fa-utensils"></i>Cardápio</a></li>
            </ul>
        </nav>

        <div class="container">
            <h1><i class="fa-solid fa-plus"></i> Cadastrar Produto</h1>
            <h3>Preencha os dados do novo produto</h3>

             
            <form action="#" method="POST">
                <div class="form-grid">
                <div class="campo">
                    <label for="nome">
                        <i class="bi bi-box-seam-fill"></i>
                        Nome do Produto*
                    </label>
                    <input type="text" placeholder="Ex: Dois amores" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="preco">
                        <i class="bi bi-currency-dollar"></i>
                        Preço de Venda (R$)*
                    </label>
                    <input type="number" placeholder="0,00" id="preco" name="preco" step="0.01" required>
                </div>

                <div class="campo">
                    <label for="preco_producao">
                        <i class="bi bi-currency-dollar"></i>
                        Preço de Produção (R$)*
                    </label>
                    <input type="number" placeholder="0,00" id="preco_producao" name="preco_producao" step="0.01"
                        required>
                </div>

                <div class="campo full">
                    <label for="descricao">
                        <i class="bi bi-file-earmark-text-fill"></i>
                        Descrição
                    </label>
                    <textarea id="descricao" placeholder="Descreva o produto..." rows="4" required></textarea>
                </div>

                <div class="campo full">
                    <label class="upload-label">
                        <i class="bi bi-image"></i>
                        Selecionar imagem
                        <input type="file" id="imagem" accept="image/*" hidden>
                    </label>
                    <img id="preview" src="" alt="Prévia da imagem">
                </div>

                </div>
                <button type="submit">
                    <i class="fa-solid fa-plus"></i>
                    Cadastrar Produto
                </button>
            </form>
        </div>

</body>

</html>
