<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="cadastro_itens.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucaria</title>
</head>

<body>
    <div align="center" class="titulo">
        <img src="img/logo.jpg.jpg" alt="Logo">
        <h1>Ama Cucaria</h1>
    </div>

    <div align="center" class="nav">
        <nav>
            <ul>
                <i class="fa-solid fa-clipboard-check"></i>
                <li><a href="#pedidos">Pedidos</a></li>

                <i class="bi bi-box-seam-fill"></i>
                <li><a href="#produtos">Produtos</a></li>

                <i class="bi bi-graph-up"></i>
                <li><a href="#dashboard">Dashboard</a></li>

                <i class="fa-solid fa-utensils"></i>
                <li><a href="#cardapio">Cardápio</a></li>
            </ul>
        </nav>
    </div>

    <div class="container">
        <h1>Cadastro Produto</h1>
        <h3>Preencha os dados do novo produto</h3>

        <i class="bi bi-box-seam-fill"></i>
        <label for="nome">Nome do Produto*</label><br>

        <input type="text" placeholder="Ex: Dois amores" id="nome" name="nome" required>

        <br><br>

        <i class="bi bi-currency-dollar"></i>
        <label for="preco">Preço de Venda(R$)*</label><br>
        <input type="number" placeholder="0,00" id="preco" name="preco" step="0.01" required><br><br>

        <i class="bi bi-currency-dollar"></i>
        <label for="preco_producao">Preço de Produção(R$)*</label><br>
        <input type="number" placeholder="0,00" id="preco_producao" name="preco_producao" step="0.01" required><br><br>

        <i class="bi bi-file-earmark-text-fill"></i>
        <label for="descricao">Descrição</label><br>
        <textarea id="descricao" placeholder="Descreva o produto..." rows="4" cols="50" required></textarea><br><br>

        <input type="submit" value="Cadastrar Produto">

        </form>
    </div>

</body>

</html>
