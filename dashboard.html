<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <title>Dashboard - Ama Cucaria</title>
</head>
<body data-dashboard-api="">
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <div class="logo-titulo">
                <img src="img/logo.jpg.jpg" alt="Logo Ama Cucaria" class="logo">
                <div>
                    <h1 class="marca-nome">Ama Cucaria</h1>
                    <p class="marca-subtitulo">CONFEITARIA ARTESANAL</p>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-adm" id="navAdm">
        <ul id="menu-adm">
            <li><a href="pedidos.html"><i class="fa-solid fa-clipboard-check"></i>Pedidos</a></li>
            <li><a href="dashboard.html" class="active"><i class="bi bi-graph-up"></i>Dashboard</a></li>
            <li><a href="cardapio.html"><i class="fa-solid fa-utensils"></i>Cardápio</a></li>
            <li><a href="lista_clientes.html"><i class="fa-solid fa-users"></i>Clientes</a></li>
        </ul>
    </nav>

    <main class="dashboard-shell">
        <section class="resumo-kpis" aria-label="Resumo financeiro">
            <article class="kpi-card kpi-card--gross">
                <p class="kpi-label">Lucro Bruto Total</p>
                <strong class="kpi-value" id="kpiLucroBruto">R$ 29.500</strong>
            </article>

            <article class="kpi-card kpi-card--costs">
                <p class="kpi-label">Custos de Produção</p>
                <strong class="kpi-value kpi-value--emphasis" id="kpiCustosProducao">R$ 12.200</strong>
            </article>

            <article class="kpi-card kpi-card--net">
                <p class="kpi-label">Lucro Líquido</p>
                <strong class="kpi-value" id="kpiLucroLiquido">R$ 17.300</strong>
            </article>
        </section>

        <section class="grafico-card" aria-labelledby="tituloGraficoDashboard">
            <header class="grafico-header">
                <div>
                    <h2 id="tituloGraficoDashboard">Visão Mensal</h2>
                    <p>Lucro bruto, custos e lucro líquido por mês</p>
                </div>
            </header>

            <div class="grafico-canvas-wrapper">
                <canvas id="dashboardChart" aria-label="Gráfico mensal financeiro" role="img"></canvas>
            </div>

            <div class="grafico-legenda" aria-label="Legenda do gráfico">
                <span><i class="legenda-cor legenda-cor--gross"></i>Lucro Bruto</span>
                <span><i class="legenda-cor legenda-cor--costs"></i>Custos</span>
                <span><i class="legenda-cor legenda-cor--net"></i>Lucro Líquido</span>
            </div>
        </section>
    </main>
</body>
<script src="dashboard.js"></script>
</html>
